name: ai_scan
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # ★追加: 日本語化対応に必須
  flutter_localizations:
    sdk: flutter

  # --- Firebase ---
  firebase_core: ^3.6.0
  cloud_functions: ^5.1.3

  # --- UI & Utilities ---
  flutter_riverpod: ^2.5.1  # 状態管理
  path: ^1.9.1
  path_provider: ^2.1.3
  intl: ^0.20.2
  image: ^4.0.6            # 画像処理
  flutter_image_compress: ^2.4.0
  permission_handler: ^12.0.1
  file_picker: ^10.3.10
  share_plus: ^12.0.1        # エクセル共有用
  url_launcher: ^6.3.2      # 追加推奨（リンクを開く等）
  shared_preferences: ^2.5.4    # ★追加: ローカルデータ保存用（累計スキャン回数など）

  # --- Database ---
  drift: ^2.29.0
  sqlite3_flutter_libs: ^0.5.40

  # --- Excel ---
  excel: ^4.0.6

  # --- Camera & Native ---
  camera: ^0.11.3
  camera_android_camerax: ^0.6.27
  google_mlkit_text_recognition: ^0.15.0 # キーワード検知用（必要なら）

  # --- AI ---
  http: ^1.2.1              # Gemini API用（後ほど削除予定ですが一旦残します）

  # ★追加: UIの商用化（フォントとアニメーション）
  flutter_animate: ^4.5.2

  # ★追加: PDF生成用
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.29.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

# ★追加: ローカルフォントの登録
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Regular.ttf
        - asset: assets/fonts/NotoSansJP-Bold.ttf
          weight: 700